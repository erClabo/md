<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazione</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>GEOMETRIA</h1>
        <p>Le formule delle forme</p>
    </header>

    <div class="contenitore">
        <div class="forma quadrato" data-aos="fade-up">
            <h2>Quadrato</h2>
            <p>A=L^2</p>
        </div>

        <div class="forma cerchio" data-aos="zoom-in">
            <h2>Cerchio</h2>
            <p>A=pi*r^2</p>
        </div>

        <div class="forma triangolo" data-aos="flip-left">
            <h2>Triangolo</h2>
            <p>S=(H*L)/2</p>
        </div>

        <div class="forma rettangolo" data-aos="slide-right">
            <h2>Rettangolo</h2>
            <p>A=b*h</p>
        </div>

        <div class="forma rombo" data-aos="fade-down">
            <h2>Rombo</h2>
            <p>A=(d1*d2)/2</p>
        </div>
    </div>

    <script src="aos.js"></script>
    <script src="script.js"></script>
</body>

</html>
