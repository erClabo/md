<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animazione</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>SCROLLATI</h1>
    </header>

    <div class="contenitore">
        <div class="forma quadrato" data-aos="fade-up"></div>

        <div class="forma cerchio" data-aos="zoom-in"></div>

        <div class="forma triangolo" data-aos="flip-left"></div>

        <div class="forma rettangolo" data-aos="slide-right"></div>

        <div class="forma rombo" data-aos="fade-down"></div>
    </div>

    <script src="aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
